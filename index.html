<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fly Fast Courier</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
  color: white;
  overflow-x: hidden;
}

/* NAVBAR */
header {
  display: flex;
  justify-content: space-between;
  padding: 20px 50px;
  backdrop-filter: blur(10px);
  position: sticky;
  top: 0;
}

.logo {
  font-size: 24px;
  color: #00e0ff;
  font-weight: 700;
}

nav a {
  color: #ccc;
  margin: 0 15px;
  text-decoration: none;
  transition: 0.3s;
}

nav a:hover {
  color: #00e0ff;
}

/* HERO */
.hero {
  text-align: center;
  padding: 120px 20px;
  animation: fadeIn 1.5s ease;
}

.hero h1 {
  font-size: 60px;
  background: linear-gradient(90deg, #00e0ff, #00ffa6);
  -webkit-background-clip: text;
  color: transparent;
}

.btn {
  padding: 12px 30px;
  background: linear-gradient(90deg, #00e0ff, #00ffa6);
  border: none;
  border-radius: 25px;
  margin-top: 20px;
  cursor: pointer;
  font-weight: bold;
}

/* GLASS CARD */
.section {
  padding: 80px 20px;
  text-align: center;
}

.glass {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(15px);
  border-radius: 15px;
  padding: 30px;
  margin: 20px auto;
  max-width: 900px;
}

/* SERVICES */
.services {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.card {
  margin: 15px;
  padding: 20px;
  width: 250px;
  border-radius: 15px;
  background: rgba(255,255,255,0.05);
  transition: 0.3s;
}

.card:hover {
  transform: translateY(-10px) scale(1.05);
}

/* TRACKING RESULT */
#result {
  margin-top: 20px;
  font-size: 18px;
  color: #00ffa6;
}

/* ANIMATION */
@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

footer {
  text-align: center;
  padding: 20px;
  background: #111;
}
</style>
</head>

<body>

<header>
  <div class="logo">Fly Fast</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Services</a>
    <a href="#">Tracking</a>
    <a href="#">Contact</a>
  </nav>
</header>

<section class="hero">
  <h1>Delivering at Lightning Speed ⚡</h1>
  <p>Premium courier experience</p>
  <button class="btn" onclick="scrollToTrack()">Track Now</button>
</section>

<section class="section">
  <h2>Our Services</h2>
  <div class="services">
    <div class="card">Same Day Delivery</div>
    <div class="card">International Shipping</div>
    <div class="card">Secure Logistics</div>
  </div>
</section>

<section class="section glass" id="tracking">
  <h2>Track Your Package</h2>
  <input id="trackInput" placeholder="Enter Tracking ID" style="padding:10px;width:60%;">
  <br><br>
  <button class="btn" onclick="trackPackage()">Track</button>

  <div id="result"></div>
</section>

<footer>
  <p>© 2026 Fly Fast Courier</p>
</footer>

<script>
function scrollToTrack() {
  document.getElementById("tracking").scrollIntoView({ behavior: "smooth" });
}

// FAKE DATABASE (can upgrade later)
const packages = {
  "FF123": "📦 Package picked up",
  "FF456": "🚚 In transit",
  "FF789": "✅ Delivered",
  "FF999": "❌ Delivery failed"
};

function trackPackage() {
  let id = document.getElementById("trackInput").value.toUpperCase();
  let result = document.getElementById("result");

  if(packages[id]) {
    result.innerHTML = "Status: " + packages[id];
  } else {
    result.innerHTML = "Tracking ID not found ❗";
  }
}
</script>

</body>
</html>
